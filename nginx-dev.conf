events {
    worker_connections 1024;
}

http {
    upstream app {
        server app-dev-https:5173;
    }

    # HTTP to HTTPS redirect
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # HTTPS server
    server {
        listen 443 ssl;
        server_name _;

        # SSL configuration
        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;

        # WebContainer security headers - CRITICAL for SharedArrayBuffer
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;

        # Security: Block access to version control files (specific to .git)
        location ~ /\.git {
            deny all;
            return 404;
        }
        
        # Block access to sensitive configuration files (only at root level)
        location ~ ^/\.(env|htaccess|htpasswd|DS_Store)$ {
            deny all;
            return 404;
        }
        
        # Block access to package files (only at root level)
        location ~ ^/(package\.json|yarn\.lock|pnpm-lock\.yaml|composer\.json)$ {
            deny all;
            return 404;
        }

        # Main proxy location
        location / {
            proxy_pass http://app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # WebSocket support - CRITICAL for WebContainers
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400;
            
            # CORS for WebContainer resources
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' '*' always;
                add_header 'Access-Control-Max-Age' 1728000 always;
                return 204;
            }
            
            add_header 'Access-Control-Allow-Origin' '*' always;
        }

        # Handle WebContainer static resources - CRITICAL
        location ~ \.(js|css|wasm)$ {
            proxy_pass http://app;
            proxy_set_header Host $host;
            add_header Cross-Origin-Embedder-Policy "require-corp" always;
            add_header Cross-Origin-Opener-Policy "same-origin" always;
            add_header 'Access-Control-Allow-Origin' '*' always;
        }
    }
}

