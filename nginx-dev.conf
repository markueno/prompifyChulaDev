events {
    worker_connections 1024;
}

http {
    upstream app {
        server app-dev-https:5173;
    }

    # HTTP to HTTPS redirect
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # HTTPS server
    server {
        listen 443 ssl;
        server_name _;

        # SSL configuration
        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;

        # WebContainer security headers - CRITICAL for SharedArrayBuffer
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;

        # # KooGallery SaaS 2.0 API endpoints (legacy individual endpoints)
        # location /api/koogallery/ {
        #     proxy_pass http://app;
        #     proxy_set_header Host $host;
        #     proxy_set_header X-Real-IP $remote_addr;
        #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        #     proxy_set_header X-Forwarded-Proto $scheme;
            
        #     # KooGallery specific headers
        #     proxy_set_header Content-Type application/json;
        #     proxy_set_header Accept application/json;
            
        #     # Increase timeout for KooGallery requests (upgrades can take longer)
        #     proxy_read_timeout 600s;
        #     proxy_connect_timeout 60s;
        #     proxy_send_timeout 600s;
            
        #     # Allow large request bodies for complex operations
        #     client_max_body_size 10M;
        # }

        # KooGallery SaaS 2.0 Main Endpoint (recommended)
        location /saasproduce {
            proxy_pass http://app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # KooGallery specific headers
            proxy_set_header Content-Type application/json;
            proxy_set_header Accept application/json;
            
            # Increase timeout for KooGallery requests
            proxy_read_timeout 600s;
            proxy_connect_timeout 60s;
            proxy_send_timeout 600s;
            
            # Allow large request bodies for complex operations
            client_max_body_size 10M;
        }

        # KooGallery SaaS 2.0 Simple Endpoint (Database-Free)
        location /saasproduce-simple {
            proxy_pass http://app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # KooGallery specific headers
            proxy_set_header Content-Type application/json;
            proxy_set_header Accept application/json;
            
            # Increase timeout for KooGallery requests
            proxy_read_timeout 600s;
            proxy_connect_timeout 60s;
            proxy_send_timeout 600s;
            
            # Allow large request bodies for complex operations
            client_max_body_size 10M;
        }

        # Main proxy location
        location / {
            proxy_pass http://app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # WebSocket support - CRITICAL for WebContainers
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400;
            
            # CORS for WebContainer resources
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' '*' always;
                add_header 'Access-Control-Max-Age' 1728000 always;
                return 204;
            }
            
            add_header 'Access-Control-Allow-Origin' '*' always;
        }

        # Handle WebContainer static resources - CRITICAL
        location ~ \.(js|css|wasm)$ {
            proxy_pass http://app;
            proxy_set_header Host $host;
            add_header Cross-Origin-Embedder-Policy "require-corp" always;
            add_header Cross-Origin-Opener-Policy "same-origin" always;
            add_header 'Access-Control-Allow-Origin' '*' always;
        }
    }
}

