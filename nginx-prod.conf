events {
    worker_connections 1024;
}

http {
    # Security: Hide nginx version and server information
    server_tokens off;
    
    # Additional security headers (applied globally)
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    upstream app {
        server app:5173;
    }

    # HTTP server - handles ACME challenges for certbot
    server {
        listen 80;
        server_name _;
        
        # Allow Let's Encrypt ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
            try_files $uri =404;
        }
        
        # Redirect all other HTTP traffic to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS server
    server {
        listen 443 ssl;
        server_name _;

        # SSL configuration - Let's Encrypt certificates (certbot)
        # Certbot stores certificates at /etc/letsencrypt/live/prompify.com/
        ssl_certificate /etc/letsencrypt/live/prompify.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/prompify.com/privkey.pem;
        
        # Fallback to manual certificates (uncomment if not using certbot):
        # ssl_certificate /etc/nginx/ssl_prompifycom/cert.pem;
        # ssl_certificate_key /etc/nginx/ssl_prompifycom/key.pem;
        
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # WebContainer security headers - CRITICAL for SharedArrayBuffer
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Resource-Policy "cross-origin" always;
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;

        # Client max body size (for file uploads)
        client_max_body_size 100M;

        # KooGallery SaaS 2.0 Main Endpoint (recommended)
        location /saasproduce {
            proxy_pass http://app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # KooGallery specific headers
            proxy_set_header Content-Type application/json;
            proxy_set_header Accept application/json;
            
            # Increase timeout for KooGallery requests
            proxy_read_timeout 600s;
            proxy_connect_timeout 60s;
            proxy_send_timeout 600s;
            
            # Allow large request bodies for complex operations
            client_max_body_size 10M;
        }

        # KooGallery SaaS 2.0 Simple Endpoint (Database-Free)
        location /saasproduce-simple {
            proxy_pass http://app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # KooGallery specific headers
            proxy_set_header Content-Type application/json;
            proxy_set_header Accept application/json;
            
            # Increase timeout for KooGallery requests
            proxy_read_timeout 600s;
            proxy_connect_timeout 60s;
            proxy_send_timeout 600s;
            
            # Allow large request bodies for complex operations
            client_max_body_size 10M;
        }

        # Security: Block access to sensitive directories and files
        location ~ /\.(git|svn|hg|bzr) {
            deny all;
            return 404;
        }
        
        location ~ /\.(env|config|secret|htaccess|htpasswd|DS_Store) {
            deny all;
            return 404;
        }
        
        # Block access to lock files (but allow package.json for version checking)
        location ~ /(yarn\.lock|pnpm-lock\.yaml|composer\.json|composer\.lock)$ {
            deny all;
            return 404;
        }
        
        # Block access to backup and temporary files
        location ~ /\.(bak|backup|old|tmp|temp)$ {
            deny all;
            return 404;
        }
        
        # Block access to log files
        location ~ /\.(log|logs)$ {
            deny all;
            return 404;
        }

        # Main proxy location
        location / {
            proxy_pass http://app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            
            # WebSocket support - CRITICAL for WebContainers
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400;
            
            # CORS for WebContainer resources
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' '*' always;
                add_header 'Access-Control-Max-Age' 1728000 always;
                return 204;
            }
            
            add_header 'Access-Control-Allow-Origin' '*' always;
        }

        # Handle WebContainer static resources - CRITICAL for SharedArrayBuffer
        # JavaScript, CSS, and WASM files MUST have COEP/COOP headers
        location ~ \.(js|css|wasm)$ {
            proxy_pass http://app;
            proxy_set_header Host $host;
            add_header Cross-Origin-Embedder-Policy "require-corp" always;
            add_header Cross-Origin-Opener-Policy "same-origin" always;
            add_header Cross-Origin-Resource-Policy "cross-origin" always;
            add_header 'Access-Control-Allow-Origin' '*' always;
        }

        # Static files caching (images, fonts, etc.)
        location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            proxy_pass http://app;
            proxy_set_header Host $host;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}

