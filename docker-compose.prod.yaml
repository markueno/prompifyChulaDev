version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: prompify-postgres
    environment:
      # POSTGRES_DB: ${POSTGRES_DB:-prompify}
      # POSTGRES_USER: ${POSTGRES_USER:-postgres}
      # POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-Mark@3156}
      POSTGRES_DB: ${POSTGRES_DB:-prompify}
      POSTGRES_USER: ${POSTGRES_USER:-prompify_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-Mark@3156}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    ports:
      - "5432:5432"
    networks:
      - prompify-network
    restart: unless-stopped
    healthcheck:
      # test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-prompify}"]
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-prompify_user} -d ${POSTGRES_DB:-prompify}"]
      interval: 30s
      timeout: 10s
      retries: 3
    profiles: ['production']

  # Redis for session storage (optional)
  redis:
    image: redis:7-alpine
    container_name: prompify-redis
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - prompify-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    profiles: ['production']

  # Prompify Application
  app:
    build:
      context: .
      target: bolt-ai-production
    container_name: prompify-app
    env_file: '.env'
    environment:
      # Core Application Settings
      - NODE_ENV=production
      - RUNNING_IN_DOCKER=true
      
      # Database Configuration (Required for production)
      - DATABASE_TYPE=postgresql
      - DATABASE_URL=postgresql://${POSTGRES_USER:-prompify_user}:${POSTGRES_PASSWORD:-Mark@3156}@postgres:5432/${POSTGRES_DB:-prompify}
      - REDIS_URL=redis://redis:6379
      
      # Authentication & Security
      - JWT_SECRET=${JWT_SECRET:-your-jwt-secret-key}
      - APP_URL=${APP_URL:-http://localhost:5173}
      - AUTH_DISABLED=${AUTH_DISABLED:-true}
      
      # AI Provider API Keys (Optional - only needed if using those services)
      - GROQ_API_KEY=${GROQ_API_KEY}
      - HuggingFace_API_KEY=${HuggingFace_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPEN_ROUTER_API_KEY=${OPEN_ROUTER_API_KEY}
      - XAI_API_KEY=${XAI_API_KEY}
      - GOOGLE_GENERATIVE_AI_API_KEY=${GOOGLE_GENERATIVE_AI_API_KEY}
      - OLLAMA_API_BASE_URL=${OLLAMA_API_BASE_URL}
      - TOGETHER_API_KEY=${TOGETHER_API_KEY}
      - TOGETHER_API_BASE_URL=${TOGETHER_API_BASE_URL}
      - AWS_BEDROCK_CONFIG=${AWS_BEDROCK_CONFIG}
      
      # Application Configuration (Optional with defaults)
      - VITE_LOG_LEVEL=${VITE_LOG_LEVEL:-debug}
      - DEFAULT_NUM_CTX=${DEFAULT_NUM_CTX:-32768}
      
      # Koogallery Integration (Optional)
      - KOOGALLERY_ACCESS_KEY=${KOOGALLERY_ACCESS_KEY}
      - KOOGALLERY_API_BASE_URL=${KOOGALLERY_API_BASE_URL}
      - KOOGALLERY_ENABLED=${KOOGALLERY_ENABLED:-true}
    volumes:
      - ./data:/app/data  # For any file uploads or logs
    ports:
      - "5173:5173"
      - "5174:5174"
    networks:
      - prompify-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5173/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    profiles: ['production']

  # Nginx Reverse Proxy (optional)
  nginx:
    image: nginx:alpine
    container_name: prompify-nginx
    volumes:
      - ./nginx-dev.conf:/etc/nginx/nginx.conf:ro
      - ./ssl_prompifycom:/etc/nginx/ssl_prompifycom:ro
    ports:
      - "80:80"
      - "443:443"
    networks:
      - prompify-network
    depends_on:
      - app
    restart: unless-stopped
    profiles: ['production']

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  prompify-network:
    driver: bridge 