version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: prompify-postgres
    environment:
      POSTGRES_DB: prompify
      POSTGRES_USER: prompify_user
      POSTGRES_PASSWORD: Mark@3156
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    ports:
      - "5432:5432"
    networks:
      - prompify-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prompify_user -d prompify"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis for session storage (optional)
  redis:
    image: redis:7-alpine
    container_name: prompify-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - prompify-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Prompify Application
  app:
    build:
      context: .
      target: bolt-ai-production
    container_name: prompify-app
    environment:
      - NODE_ENV=production
      - DATABASE_TYPE=postgresql
      - DATABASE_URL=postgresql://prompify_user:${POSTGRES_PASSWORD:-your-secure-password}@postgres:5432/prompify
      - JWT_SECRET=${JWT_SECRET:-your-jwt-secret-key}
      - APP_URL=${APP_URL:-http://localhost:3000}
      - REDIS_URL=redis://redis:6379
      - AUTH_DISABLED=${AUTH_DISABLED:-false}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - prompify-network
    restart: unless-stopped
    volumes:
      - ./data:/app/data  # For any file uploads or logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx Reverse Proxy (optional)
  nginx:
    image: nginx:alpine
    container_name: prompify-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx-dev.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    networks:
      - prompify-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  prompify-network:
    driver: bridge 